<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BVLTN Session</title>
<link rel="stylesheet" href="style.css">


</head>

<body>

<!-- ========================= -->
<!-- HOME -->
<!-- ========================= -->

<div id="homePage">

<div class="card">

<h1>BVLTN Session</h1>

<p>Please read before recording.</p>

<ul>

<li>Record inside a parked car.</li>

<li>Turn the engine OFF.</li>

<li>Close all windows.</li>

<li>Use earphones.</li>

<li>Hold your phone naturally.</li>

<li>Do not cover the microphone.</li>

<li>Complete all 5 takes before submission.</li>

</ul>

<button onclick="startSession()">
START
</button>

</div>

<div id="producerLink" onclick="showLogin()">
Producer Login
</div>

</div>

<!-- ========================= -->
<!-- LOGIN -->
<!-- ========================= -->

<div id="loginPage" class="hidden">

<div class="card">

<h1>Producer Login</h1>

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">

Login

</button>

<button onclick="goHome()">

Back

</button>

</div>

</div>

<!-- ========================= -->
<!-- PRODUCER -->
<!-- ========================= -->

<div id="producerPage" class="hidden">

<div class="card">

<h1>BVLTN Producer</h1>

<button>

Upload Instrumental

</button>

<button>

Upload Guide Vocal

</button>

<button>

NEXT

</button>

</div>

</div>


<script src="script.js"></script>
</body>

</html>
