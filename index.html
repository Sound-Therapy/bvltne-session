<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BVLTN Session</title>

<style>

body{

    font-family:Arial, Helvetica, sans-serif;
    background:#111;
    color:white;

    max-width:600px;

    margin:auto;

    padding:30px;

}

h1{

    text-align:center;

}

.card{

    background:#222;

    padding:25px;

    border-radius:12px;

}

ul{

    line-height:2;

}

button{

    width:100%;

    padding:16px;

    font-size:20px;

    margin-top:20px;

    border:none;

    border-radius:10px;

    cursor:pointer;

}

#producer{

    text-align:center;

    margin-top:30px;

    color:#888;

    font-size:13px;

    cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h1>BVLTN Session</h1>

<p>Please read before recording.</p>

<ul>

<li>Record inside a parked car.</li>

<li>Turn the engine OFF.</li>

<li>Close all windows.</li>

<li>Use earphones.</li>

<li>Hold your phone naturally.</li>

<li>Do not cover the microphone.</li>

<li>All 5 takes must be completed before submission.</li>

</ul>

<button>START</button>

</div>

<div id="producer">

Producer Login

</div>

</body>

</html>
